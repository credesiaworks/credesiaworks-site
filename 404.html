<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>ページが見つかりません | Credesia Works</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2937;
        --muted: #667085;
        --blue: #1e66c1;
        --bg: #f6f8fb;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        color: var(--ink);
        font-family: "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.8;
        background: var(--bg);
      }

      main {
        width: min(640px, 100%);
        padding: 40px;
        background: #fff;
        border: 1px solid #e5e7eb;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.7rem, 4vw, 2.4rem);
        line-height: 1.35;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        padding: 0 18px;
        color: #fff;
        background: var(--blue);
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ページが見つかりません</h1>
      <p>URLが変更されたか、ページが削除された可能性があります。</p>
      <a href="/">トップページへ戻る</a>
    </main>
  </body>
</html>
